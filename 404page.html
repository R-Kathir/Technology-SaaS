<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>404 - Page Not Found | Stackly</title>

     

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

     

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

     

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />

 <link rel="stylesheet" href="shared.css">
</head>

<body>
    <style>
         

         
        .not-found-section {
            position: relative;
            min-height: 100vh;
            background-color: var(--clr-bg-base);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 2rem;
        }

         
        .error-bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: 50px 50px;
            background-image:
                linear-gradient(to right, rgba(161, 161, 166, 0.15) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(161, 161, 166, 0.15) 1px, transparent 1px);
            mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
            z-index: 1;
        }

         
        .relative {
            position: relative;
        }

        .z-10 {
            z-index: 10;
        }

        .text-center {
            text-align: center;
        }

        .mx-auto {
            margin-left: auto;
            margin-right: auto;
        }

        .max-w-2xl {
            max-width: 600px;
        }

        .mb-3 {
            margin-bottom: 1rem;
        }

        .mb-5 {
            margin-bottom: 2.5rem;
        }

        .text-muted {
            color: var(--clr-text-body);
        }

         
        .error-visual {
            position: relative;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .error-code {
            font-family: var(--font-secondary);
            font-size: 8rem;
            font-weight: 800;
            color: var(--clr-text-heading);
            line-height: 1;
            margin: 0;
            position: relative;
            z-index: 2;
            letter-spacing: -4px;
        }

        .error-orb {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--clr-logo-teal) 0%, transparent 70%);
            filter: blur(20px);
            opacity: 0.4;
            z-index: 1;
        }

         
        .badge-error {
            display: inline-block;
            background-color: rgba(242, 118, 34, 0.1);
            color: var(--clr-primary);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-family: var(--font-primary);
        }

        .error-heading {
            font-family: var(--font-secondary);
            font-size: 2.5rem;
            color: var(--clr-text-heading);
            margin-bottom: 1rem;
        }

        .error-desc {
            font-family: var(--font-primary);
            font-size: 1.1rem;
            line-height: 1.6;
        }

         
        .error-actions {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            font-family: var(--font-primary);
            font-size: 1rem;
            text-decoration: none;
            transition: var(--transition-smooth);
            cursor: pointer;
        }

        .btn-primary {
            background-color: var(--clr-primary);
            color: var(--clr-text-inverse);
            border: 2px solid var(--clr-primary);
            box-shadow: var(--shadow-primary);
        }

        .btn-primary:hover {
            background-color: var(--clr-primary-hover);
            border-color: var(--clr-primary-hover);
            transform: translateY(-2px);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--clr-text-heading);
            border: 2px solid var(--clr-border-subtle);
        }

        .btn-outline:hover {
            border-color: var(--clr-text-heading);
            transform: translateY(-2px);
        }

        .btn .material-symbols-rounded {
            font-size: 1.2rem;
        }

         
        @media (max-width: 768px) {
            .error-code {
                font-size: 6rem;
            }

            .error-heading {
                font-size: 2rem;
            }

            .error-actions {
                flex-direction: column;
                gap: 1rem;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
    <section class="not-found-section">
        <div class="error-bg-grid"></div>

        <div class="container text-center relative z-10">
            <div class="error-content mx-auto max-w-2xl">

                <div class="error-visual">
                    <div class="error-orb"></div>
                    <h1 class="error-code">404</h1>
                </div>

                <span class="badge badge-error mb-3">System Alert</span>
                <h2 class="error-heading">Route Not Found</h2>
                <p class="error-desc text-muted mb-5">
                    The endpoint you are requesting has dropped the connection. It may have been moved, deleted, or
                    perhaps it never existed in our architecture.
                </p>

                <div class="error-actions">
                    <a href="index.html" class="btn btn-primary">
                        <span class="material-symbols-rounded">home</span>
                        Return to Home
                    </a>
                    <button onclick="history.back()" class="btn btn-outline">
                        <span class="material-symbols-rounded">arrow_back</span>
                        Go Back
                    </button>
                </div>

            </div>
        </div>
    </section>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <script>
 
gsap.registerPlugin(ScrollTrigger);

 
        gsap.to(".error-visual", {
            y: -15,
            duration: 2,
            ease: "power1.inOut",
            yoyo: true,
            repeat: -1
        });

 
        const errorTl = gsap.timeline();

        errorTl
            .from(".error-bg-grid", {
                opacity: 0,
                scale: 0.9,
                duration: 1.5,
                ease: "power2.out"
            })
            .from(".error-code", {
                y: 50,
                opacity: 0,
                duration: 0.8,
                ease: "back.out(1.5)"
            }, "-=1")
            .from(".badge-error", {
                y: 20,
                opacity: 0,
                duration: 0.5,
                ease: "power2.out"
            }, "-=0.6")
            .from(".error-heading", {
                y: 20,
                opacity: 0,
                duration: 0.5,
                ease: "power2.out"
            }, "-=0.4")
            .from(".error-desc", {
                y: 20,
                opacity: 0,
                duration: 0.5,
                ease: "power2.out"
            }, "-=0.3")
           
    </script>
</body>

</html>
